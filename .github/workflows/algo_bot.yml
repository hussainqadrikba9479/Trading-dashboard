name: 24/7 Hussain Algo Bot

on:
  schedule:
    - cron: '*/30 * * * *'  # Har 30 minute baad chalega
  workflow_dispatch:        # Button daba kar manual test karne ke liye

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Requirements
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance openpyxl google-generativeai requests

    - name: Run Alert Bot
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_SENDER }}
      run: python alert_bot.py
